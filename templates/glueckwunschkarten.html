<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Bildvorschau">
  <button class="lightbox-close" id="lb-close" aria-label="Schließen">✕</button>
  <div class="lightbox-inner">
    <button class="lightbox-nav" id="lb-prev" aria-label="Vorheriges Bild">‹</button>
    <img id="lb-img" src="" alt="Vergrößerte Ansicht">
    <button class="lightbox-nav" id="lb-next" aria-label="Nächstes Bild">›</button>
  </div>
  <span class="lightbox-counter" id="lb-counter"></span>
</div>

<script>
  const hamburger = document.getElementById('hamburger');
  const navLinks = document.getElementById('nav-links');
  hamburger.addEventListener('click', () => {
    const open = navLinks.classList.toggle('open');
    hamburger.classList.toggle('open', open);
    hamburger.setAttribute('aria-expanded', open);
  });
  navLinks.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
    navLinks.classList.remove('open'); hamburger.classList.remove('open');
  }));

  const imgs = Array.from(document.querySelectorAll('#gallery img'));
  const imgObs = new IntersectionObserver(e => e.forEach(x => { if (x.isIntersecting) x.target.classList.add('loaded'); }), { threshold: 0.05 });
  imgs.forEach(img => { img.addEventListener('load', () => img.classList.add('loaded')); if (img.complete) img.classList.add('loaded'); imgObs.observe(img); });

  let cur = 0;
  const lb = document.getElementById('lightbox'), lbImg = document.getElementById('lb-img'), lbCnt = document.getElementById('lb-counter');
  function openLb(i) { cur=i; lbImg.src=imgs[i].src; lbCnt.textContent=(i+1)+' / '+imgs.length; lb.classList.add('open'); document.body.style.overflow='hidden'; }
  function closeLb() { lb.classList.remove('open'); document.body.style.overflow=''; }
  function nav(d) { cur=(cur+d+imgs.length)%imgs.length; lbImg.src=imgs[cur].src; lbCnt.textContent=(cur+1)+' / '+imgs.length; }
  imgs.forEach((img,i) => img.addEventListener('click', () => openLb(i)));
  document.getElementById('lb-close').addEventListener('click', closeLb);
  document.getElementById('lb-prev').addEventListener('click', e => { e.stopPropagation(); nav(-1); });
  document.getElementById('lb-next').addEventListener('click', e => { e.stopPropagation(); nav(+1); });
  lb.addEventListener('click', e => { if (e.target===lb) closeLb(); });
  document.addEventListener('keydown', e => { if (!lb.classList.contains('open')) return; if (e.key==='Escape') closeLb(); if (e.key==='ArrowLeft') nav(-1); if (e.key==='ArrowRight') nav(+1); });
</script>
