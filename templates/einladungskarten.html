<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Einladungskarten – Ines Papierideen</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar solid" id="navbar">
  <a href="/" class="nav-logo">Ines&nbsp;Papierideen</a>
  <button class="hamburger" id="hamburger" aria-label="Menü öffnen" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <ul class="nav-links" role="list">
    <li><a href="/#hero">Start</a></li>
    <li><a href="/#kategorien">Kategorien</a></li>
    <li><a href="/#kontakt">Kontakt</a></li>
  </ul>
</nav>

<section class="page-hero">
  <div class="page-hero-inner">
    <p class="section-label">Kategorie</p>
    <h1>Einladungs&shy;<em>karten</em></h1>
    <p>Einladungen, die Vorfreude wecken – handgemacht für Euren besonderen Tag.</p>
  </div>
</section>

<section class="gallery-section">
  <a href="/" class="gallery-back">
    <span class="gallery-back-arrow">←</span> Zurück zur Startseite
  </a>
  <!-- WhatsApp 19.06_edited is used as index thumbnail → only 19.03.13 shown here -->
  <div class="masonry-grid" id="gallery">
    <img src="/images/Einladungskarten/WhatsApp%20Image%202021-02-01%20at%2019.03.13.jpeg"
         alt="Einladungskarte" loading="lazy">
  </div>
</section>

<footer>
  <span class="footer-logo">Ines Papierideen</span>
  <span class="footer-copy">© 2026 · Gemacht mit <span class="footer-heart">♥</span></span>
</footer>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
  <button class="lightbox-close" id="lb-close">✕</button>
  <div class="lightbox-inner">
    <button class="lightbox-nav" id="lb-prev">‹</button>
    <img id="lb-img" src="" alt="">
    <button class="lightbox-nav" id="lb-next">›</button>
  </div>
  <span class="lightbox-counter" id="lb-counter"></span>
</div>

<script>
  const hamburger = document.getElementById('hamburger');
  const navLinks  = document.getElementById('nav-links');
  hamburger.addEventListener('click', () => { const open = navLinks.classList.toggle('open'); hamburger.classList.toggle('open', open); hamburger.setAttribute('aria-expanded', open); });
  navLinks.querySelectorAll('a').forEach(a => a.addEventListener('click', () => { navLinks.classList.remove('open'); hamburger.classList.remove('open'); }));
  const imgs = Array.from(document.querySelectorAll('#gallery img'));
  const imgObs = new IntersectionObserver(e => e.forEach(x => { if (x.isIntersecting) x.target.classList.add('loaded'); }), { threshold: 0.05 });
  imgs.forEach(img => { img.addEventListener('load', () => img.classList.add('loaded')); if (img.complete) img.classList.add('loaded'); imgObs.observe(img); });
  let cur = 0;
  const lb = document.getElementById('lightbox'), lbImg = document.getElementById('lb-img'), lbCnt = document.getElementById('lb-counter');
  function openLb(i) { cur=i; lbImg.src=imgs[i].src; lbCnt.textContent=(i+1)+' / '+imgs.length; lb.classList.add('open'); document.body.style.overflow='hidden'; }
  function closeLb() { lb.classList.remove('open'); document.body.style.overflow=''; }
  function nav(d) { cur=(cur+d+imgs.length)%imgs.length; lbImg.src=imgs[cur].src; lbCnt.textContent=(cur+1)+' / '+imgs.length; }
  imgs.forEach((img,i) => img.addEventListener('click', () => openLb(i)));
  document.getElementById('lb-close').addEventListener('click', closeLb);
  document.getElementById('lb-prev').addEventListener('click', e => { e.stopPropagation(); nav(-1); });
  document.getElementById('lb-next').addEventListener('click', e => { e.stopPropagation(); nav(+1); });
  lb.addEventListener('click', e => { if (e.target===lb) closeLb(); });
  document.addEventListener('keydown', e => { if (!lb.classList.contains('open')) return; if (e.key==='Escape') closeLb(); if (e.key==='ArrowLeft') nav(-1); if (e.key==='ArrowRight') nav(+1); });
</script>
</body>
</html>
